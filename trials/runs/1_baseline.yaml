trial_name: 1_baseline

description: |
  Current pipeline - two-pass artifact removal.
  detect_saturation_periods scans the full filtered recording,
  then remove_saturation_artifacts is applied lazily.

duration_hours: 1.0
n_jobs: 12

highpass:
  ftype: bessel

artifact:
  method: two_pass
  abs_threshold: 1500
  direction: upper
  ms_before: 10
  ms_after: 10

dredge:
  enabled: true
  preset: dredge
  win_step_um: 100
  win_scale_um: 100
  win_margin_um: -15

cmr:
  global_operator: median
  local_reference: local

bandpass:
  freq_min: 300
  freq_max: 7500
