trial_name: 15_highpass_first

description: |
  Highpass filter BEFORE artifact detection — for comparison with trial 14
  (which detects on raw data). Detection on filtered data may miss flat
  saturation plateaus (which become ~0 after highpass), only catching the
  onset/offset transients.

duration_hours: 1.0
n_jobs: 12
chunk_duration: "5s"

highpass:
  ftype: bessel

artifact:
  abs_threshold: 1500
  direction: upper
  ms_before: 100
  ms_after: 100
  mode: linear
  before_highpass: false

intermediate_save:
  enabled: true

dredge:
  enabled: true
  preset: dredge
  win_step_um: 150
  win_scale_um: 150
  win_margin_um: -75

cmr:
  global_operator: median
  local_reference: local

bandpass:
  freq_min: 300
  freq_max: 7500

kilosort:
  batch_size: 30000
  nblocks: 0
