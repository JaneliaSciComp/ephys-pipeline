trial_name: 2_lazy_artifact

description: |
  SaturationArtifactRemover - single lazy pass.
  Detection and removal happen per-chunk with margin_ms of overlap,
  so no separate full-recording scan is needed.

duration_hours: 1.0
n_jobs: 12

highpass:
  ftype: bessel

artifact:
  method: lazy
  abs_threshold: 1500
  direction: upper
  ms_before: 10
  ms_after: 10
  margin_ms: 500

dredge:
  enabled: true
  preset: dredge
  win_step_um: 100
  win_scale_um: 100
  win_margin_um: -15

cmr:
  global_operator: median
  local_reference: local

bandpass:
  freq_min: 300
  freq_max: 7500
