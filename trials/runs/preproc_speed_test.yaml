trial_name: preproc_speed_01

# How much of the recording to benchmark against.
# 1.0 = one hour; reduce if you want a quicker sanity check.
duration_hours: 1.0

# Margin (ms) used by SaturationArtifactRemover (Approach B) to handle
# artifacts that span chunk boundaries.  500ms covers virtually all
# real artefacts; lower values reduce per-chunk memory slightly.
margin_ms: 500.0

abs_threshold: 1500
n_jobs: 12

# Where to write timing results (preproc_speed_results.json).
# Defaults to <day_dir>/output/<probe>/shank_<N>/preproc_speed/<trial_name>/
# output_dir: /path/to/custom/output
