trial_name: 3_intermediate_save

description: |
  Two-pass artifact removal + intermediate save before DREDge.
  After the filter chain and shank split, the recording is materialised
  to disk once so DREDge, bad channel detection, and the final save all
  read from a simple binary rather than re-applying the filter chain.

duration_hours: 1.0
n_jobs: 12

highpass:
  ftype: bessel

artifact:
  method: two_pass
  abs_threshold: 1500
  direction: upper
  ms_before: 10
  ms_after: 10

intermediate_save:
  enabled: true

dredge:
  enabled: true
  preset: dredge
  win_step_um: 100
  win_scale_um: 100
  win_margin_um: -15

cmr:
  global_operator: median
  local_reference: local

bandpass:
  freq_min: 300
  freq_max: 7500
