trial_name: smaller_windows
description: "smaller artifact window to check 10 10 "

ks_batch_size: 30000
ks_extra_settings: {nblocks: 0}
n_jobs: 12

pipeline:
  - step: slice_time
    start_time_s: 0
    duration_s: 3600
  - step: highpass_filter
    ftype: bessel
  - step: phase_shift
  - step: remove_artifacts
    threshold: 3900
    ms_before: 10
    ms_after: 10
    mode: linear
  - step: split_shank
  - step: correct_motion
    preset: dredge
    estimate_motion_kwargs:
      win_step_um: 100
      win_scale_um: 100
      win_margin_um: -15
  - step: global_cmr
    operator: median
  - step: detect_interpolate_bad_channels
    methods: [coherence+psd, mad]
  - step: local_cmr
  - step: bandpass_filter
    freq_min: 300.0
    freq_max: 7500.0

