trial_name: 5_baseline_64cores

description: |
  Baseline two-pass artifact removal at 64 cores.
  Same as 1_baseline but with n_jobs=64 and BENCH_CORES=64
  to test whether more parallelism speeds up the bottleneck steps.

duration_hours: 1.0
n_jobs: 64

highpass:
  ftype: bessel

artifact:
  method: two_pass
  abs_threshold: 1500
  direction: upper
  ms_before: 10
  ms_after: 10

dredge:
  enabled: true
  preset: dredge
  win_step_um: 100
  win_scale_um: 100
  win_margin_um: -15

cmr:
  global_operator: median
  local_reference: local

bandpass:
  freq_min: 300
  freq_max: 7500
