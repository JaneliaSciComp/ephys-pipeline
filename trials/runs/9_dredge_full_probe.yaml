trial_name: dredge_full_probe
description: "DREDge motion correction before split_shank — uses all 384 channels for a better motion estimate"

ks_batch_size: 30000
ks_extra_settings: {nblocks: 0}
n_jobs: 12

pipeline:
  - step: slice_time
    start_time_s: 0
    duration_s: 3600
  - step: remove_artifacts
    threshold: 3900
    ms_before: 50
    ms_after: 50
  - step: highpass_filter
    ftype: bessel
  - step: phase_shift
  - step: correct_motion           # full 384-ch probe — more data for motion estimation
    preset: nonrigid_accurate
  - step: split_shank
  - step: global_cmr
    operator: median
  - step: detect_interpolate_bad_channels
    methods: [coherence+psd, mad]
  - step: local_cmr
  - step: bandpass_filter
    freq_min: 300.0
    freq_max: 7500.0
