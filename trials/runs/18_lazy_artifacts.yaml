trial_name: 18_lazy_artifacts

description: |
  Single-pass detect+remove via SaturationArtifactRemover. Each chunk worker
  detects, interpolates, and logs detected periods to a per-chunk file during
  the intermediate save. After save, logs are merged into artifact_periods.json.
  Skips the dedicated detection scan (~1.5 min saved on 1h data).

duration_hours: 1.0
n_jobs: 12
chunk_duration: "5s"

highpass:
  ftype: bessel

artifact:
  abs_threshold: 3500
  direction: upper
  ms_before: 100
  ms_after: 100
  mode: linear
  margin_ms: 500
  lazy: true
  before_highpass: true

intermediate_save:
  enabled: true

dredge:
  enabled: true
  preset: dredge
  win_step_um: 150
  win_scale_um: 150
  win_margin_um: -75

cmr:
  global_operator: median
  local_reference: local

bandpass:
  freq_min: 300
  freq_max: 7500

kilosort:
  batch_size: 30000
  nblocks: 0
