# ── Trial identification ───────────────────────────────────────────────────────
trial_name: artifacts_linear5      # becomes the output subdirectory name
description: "Applied linear interpolation for artifact removal instead of zero-filling 5ms before and after (vs. 50ms in the original trial)"

# ── Kilosort4 settings ─────────────────────────────────────────────────────────
ks_batch_size: 30000
ks_extra_settings: {}              # any additional run_kilosort() kwargs, e.g. {nblocks: 1}

# ── Cluster / parallelism ──────────────────────────────────────────────────────
n_jobs: 12

# ── Preprocessing pipeline ────────────────────────────────────────────────────
# Steps are executed in the order listed. This default sequence reproduces the
# current run_shank.py pipeline exactly.
#
# Rules:
#   - split_shank must appear exactly once, and after phase_shift
#   - Steps before split_shank operate on all 384 channels (full probe)
#   - Steps from split_shank onward operate on the single shank only
#
# Available steps and their parameters:
#
#   slice_time          start_time_s (default 0), duration_s (default 3600)
#   remove_artifacts    threshold (3900), ms_before (50), ms_after (50)
#   highpass_filter     ftype ("bessel")
#   phase_shift         (no params — always uses NP2 ADC correction)
#   split_shank         (no params)
#   global_cmr          operator ("median" | "average")
#   highpass_spatial_filter  (no params — alternative destriping strategy)
#   correct_motion      preset ("nonrigid_accurate" | "rigid_fast" | "kilosort_like")
#   detect_interpolate_bad_channels   methods (list: "coherence+psd", "mad")
#   local_cmr           (no params)
#   bandpass_filter     freq_min (300.0), freq_max (7500.0)

pipeline:

  - step: slice_time
    start_time_s: 0
    duration_s: 3600

  - step: remove_artifacts
    threshold: 3900
    ms_before: 5
    ms_after: 5
    mode: linear

  - step: highpass_filter
    ftype: bessel

  - step: phase_shift

  - step: split_shank         # everything below this acts on the single shank

  - step: global_cmr
    operator: median

  - step: detect_interpolate_bad_channels
    methods:
      - coherence+psd
      - mad

  - step: local_cmr

  - step: bandpass_filter
    freq_min: 300.0
    freq_max: 7500.0


